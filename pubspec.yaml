name: water_reminder
description: SipUp – A premium water intake reminder app with intelligent scheduling.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Notifications
  flutter_local_notifications: ^17.2.2

  # Background Work
  workmanager: ^0.5.2

  # Charts
  fl_chart: ^0.69.0

  # Preferences
  shared_preferences: ^2.2.3

  # Permissions
  permission_handler: ^11.3.1

  # Utilities
  intl: ^0.19.0
  path_provider: ^2.1.3
  uuid: ^4.4.2
  timezone: ^0.9.4
  flutter_timezone: ^2.0.0

  # Animations
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
